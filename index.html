<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./logo-quiroz.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiroz Digital Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const isGithubPages = window.location.hostname.endsWith('github.io')

      if (isGithubPages) {
        const base = '/dise-oweb.quiroz/'
        const stylesheet = document.createElement('link')
        stylesheet.rel = 'stylesheet'
        stylesheet.href = `${base}assets/index.css`
        document.head.appendChild(stylesheet)
        import(`${base}assets/main.js`)
      } else {
        import('/src/main.tsx')
      }
    </script>
  </body>
</html>
